<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReinMarket — свежие продукты для вашего СНТ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F3EA;
    --pine:#24352B;
    --pine-dark:#182119;
    --berry:#B23A2E;
    --berry-dark:#8F2D23;
    --gold:#C99A3E;
    --ink:#23241F;
    --card:#FFFFFF;
    --line:rgba(36,53,43,0.14);
    --shadow: 0 10px 30px rgba(36,53,43,0.10);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Manrope',sans-serif;
    line-height:1.5;
  }
  h1,h2,h3{
    font-family:'Fraunces',serif;
    margin:0 0 .3em 0;
    color:var(--pine);
    letter-spacing:-0.01em;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}

  /* ---------- Header ---------- */
  .site-header{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 5vw;
    background:rgba(246,243,234,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .logo{
    font-family:'Fraunces',serif;
    font-size:1.5rem; font-weight:700;
    color:var(--pine);
  }
  .logo .accent{color:var(--berry);}
  .site-header nav{display:flex; gap:26px; font-weight:600; font-size:.95rem;}
  .site-header nav a{text-decoration:none; opacity:.8; transition:opacity .2s;}
  .site-header nav a:hover{opacity:1; color:var(--berry);}
  .cart-btn{
    position:relative;
    background:var(--pine); color:#fff; border:none;
    padding:10px 16px; border-radius:999px; font-weight:700; font-size:.95rem;
    display:flex; align-items:center; gap:8px;
    transition:transform .15s ease, background .2s;
  }
  .cart-btn:hover{background:var(--pine-dark); transform:translateY(-1px);}
  .cart-count{
    background:var(--berry); color:#fff; border-radius:999px;
    min-width:20px; height:20px; padding:0 5px; font-size:.75rem;
    display:flex; align-items:center; justify-content:center;
  }

  /* ---------- Hero ---------- */
  .hero{
    display:grid; grid-template-columns:1.1fr 1fr; gap:40px;
    align-items:center;
    padding:64px 5vw 40px;
    max-width:1280px; margin:0 auto;
  }
  .hero .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:.8rem; letter-spacing:.08em;
    text-transform:uppercase; color:var(--berry); font-weight:600; margin-bottom:14px; display:block;
  }
  .hero h1{font-size:clamp(2.1rem, 4vw, 3.4rem); font-weight:700; line-height:1.05;}
  .hero p{font-size:1.05rem; max-width:46ch; color:#3a3c34; margin:18px 0 28px;}
  .hero-ctas{display:flex; gap:14px; flex-wrap:wrap;}
  .btn-primary{
    background:var(--berry); color:#fff; border:none; padding:14px 26px;
    border-radius:10px; font-weight:700; font-size:1rem;
    box-shadow:var(--shadow); transition:transform .15s ease, background .2s;
  }
  .btn-primary:hover{background:var(--berry-dark); transform:translateY(-2px);}
  .btn-secondary{
    background:transparent; color:var(--pine); border:1.5px solid var(--pine);
    padding:13px 24px; border-radius:10px; font-weight:700; font-size:1rem;
    transition:background .2s, color .2s;
  }
  .btn-secondary:hover{background:var(--pine); color:#fff;}

  /* signature route graphic */
  .route-wrap{
    position:relative; background:var(--pine); border-radius:22px;
    padding:26px; box-shadow:var(--shadow); overflow:hidden;
  }
  .route-wrap::before{
    content:"Где нас найти"; position:absolute; top:18px; left:26px;
    font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.06em;
    text-transform:uppercase; color:rgba(255,255,255,.55); z-index:2;
  }
  .hero-map{
    width:100%; display:block; margin-top:26px; border-radius:12px;
    position:relative; z-index:1;
  }
  .map-fallback{
    display:inline-block; margin-top:12px; font-size:.82rem; font-weight:600;
    color:rgba(255,255,255,.75); text-decoration:none;
  }
  .map-fallback:hover{color:#fff;}

  /* ---------- Sections ---------- */
  section{padding:20px 5vw;}
  .catalog{max-width:1280px; margin:20px auto 0;}
  .catalog-head{display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:18px;}
  .catalog-head p{color:#5b5d52; margin:0;}

  .category-filters{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:26px;}
  .cat-chip{
    background:#fff; border:1px solid var(--line); padding:8px 16px;
    border-radius:999px; font-weight:600; font-size:.85rem; color:var(--pine);
    transition:all .15s ease;
  }
  .cat-chip.active, .cat-chip:hover{background:var(--pine); color:#fff; border-color:var(--pine);}

  .product-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:20px;
  }
  .product-card{
    background:var(--card); border-radius:16px; padding:18px;
    border:1px solid var(--line); box-shadow:var(--shadow);
    display:flex; flex-direction:column; gap:10px;
    transition:transform .18s ease;
  }
  .product-card:hover{transform:translateY(-4px);}
  .product-media{
    height:130px; border-radius:12px; background:#F0EBDC;
    display:flex; align-items:center; justify-content:center; font-size:3.2rem;
    overflow:hidden;
  }
  .product-media img{width:100%; height:100%; object-fit:cover;}
  .product-cat{font-family:'IBM Plex Mono',monospace; font-size:.68rem; text-transform:uppercase; letter-spacing:.06em; color:var(--gold); font-weight:600;}
  .product-card h3{font-size:1.05rem; margin:0;}
  .product-desc{font-size:.85rem; color:#6b6d61; flex-grow:1; margin:0;}
  .product-foot{display:flex; align-items:center; justify-content:space-between; margin-top:4px;}
  .price{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:1.05rem; color:var(--pine);}
  .add-btn{
    background:var(--pine); color:#fff; border:none; padding:9px 14px; border-radius:8px;
    font-weight:700; font-size:.85rem; transition:background .2s;
  }
  .add-btn:hover{background:var(--berry);}
  .empty-note{color:#7a7c6e; font-style:italic; padding:20px 0;}

  /* ---------- About / Address ---------- */
  .about{max-width:1280px; margin:60px auto; display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:start;}
  .info-card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:26px; box-shadow:var(--shadow);
  }
  .info-card .label{font-family:'IBM Plex Mono',monospace; font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; color:var(--berry); font-weight:700; display:block; margin-bottom:8px;}
  .info-card p{margin:0 0 14px; color:#3a3c34;}
  .info-card p:last-child{margin-bottom:0;}
  .map-embed{border-radius:12px; margin-top:14px; display:block;}

  /* ---------- Footer ---------- */
  footer{
    background:var(--pine); color:#e7e6da; padding:40px 5vw 26px; margin-top:40px;
  }
  .footer-grid{max-width:1280px; margin:0 auto; display:flex; justify-content:space-between; flex-wrap:wrap; gap:20px; align-items:flex-end;}
  footer .logo{color:#fff;}
  footer .logo .accent{color:#E8867A;}
  footer small{opacity:.6; display:block; margin-top:6px;}
  .dev-btn{
    background:transparent; border:1px solid rgba(255,255,255,.25); color:rgba(255,255,255,.55);
    padding:8px 16px; border-radius:8px; font-size:.78rem; font-family:'IBM Plex Mono',monospace;
    transition:all .2s;
  }
  .dev-btn:hover{border-color:#fff; color:#fff;}

  /* ---------- Modals ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(24,33,25,0.55); backdrop-filter:blur(2px);
    display:flex; align-items:center; justify-content:center; z-index:200; padding:20px;
  }
  .hidden{display:none !important;}
  .modal-box{
    background:#fff; border-radius:18px; max-width:560px; width:100%;
    max-height:88vh; overflow-y:auto; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,.3);
    position:relative;
  }
  .modal-box.wide{max-width:840px;}
  .modal-close{
    position:absolute; top:16px; right:16px; background:#F0EBDC; border:none;
    width:32px; height:32px; border-radius:50%; font-size:1rem; color:var(--ink);
  }
  .modal-box h2{margin-bottom:16px;}

  .field{margin-bottom:14px;}
  .field label{display:block; font-size:.82rem; font-weight:700; margin-bottom:5px; color:var(--pine);}
  .field input[type=text], .field input[type=tel], .field input[type=number], .field select, .field textarea{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-family:inherit; font-size:.95rem; background:#FBFAF6;
  }
  .field textarea{resize:vertical; min-height:70px;}
  .radio-row{display:flex; gap:16px; margin-bottom:10px;}
  .radio-row label{display:flex; align-items:center; gap:8px; font-weight:600;
